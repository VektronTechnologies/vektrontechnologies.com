  <path d="M 52.0,80 L 309.6,240 L 500,680 L 690.4,240 L 948.0,80 L 711.1,540 L 824.7,700 L 613.3,730 L 500,950 L 386.7,730 L 175.3,700 L 288.9,540 Z" fill="#53268E"/>

